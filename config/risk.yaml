# Risk-engine limits. Overrides the built-in defaults in risk/limits.py.
# All loss/exposure fields are fractions in (0, 1]; require daily < weekly < kill.

max_position_weight: 1.00     # per-symbol cap. The universe is diversified ETFs
                              # and tactical strategies legitimately take 100%
                              # single-ETF positions, so the cap is 100%.
max_gross_exposure: 1.00      # long-only, no leverage: sum(weights) <= 1.
max_daily_loss: 0.03          # 3% single-session portfolio loss -> HALT.
max_weekly_loss: 0.08         # 8% rolling 5-session loss -> HALT.
max_drawdown_kill: 0.25       # 25% peak-to-trough -> KILL SWITCH (manual reset).
staleness_max_sessions: 1     # data older than this many completed sessions -> FREEZE.
weekly_divergence_alert_bps: 50  # weekly paper-vs-shadow gap beyond this (bps) ->
                                 # the weekly review flags DIVERGING (report-only).
